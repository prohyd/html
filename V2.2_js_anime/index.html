<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Практическая работа 2</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="./javaScript/index.js"></script>
</head>
<body>
    <form id="setting">
        <div id="coordCont">Скорость анимации
            <p>
                <label for="speedAnimation">мс: </label>
                <input type="number" id="speedAnimation" value="7000" min="1000" max="20000">
            </p>
        </div>
        <div id="scaleCont">Масштаб
            <p>
                <label for="sx">от: </label>
                <input type="number" id="sx" value="0.7" min="0.2" max="3" step="0.1">
            </p>
            <p>
                <label for="sx_final">до: </label>
                <input type="number" id="sx_final" value="1.2" min="0.2" max="3" step="0.1">
            </p>
        </div>
        <div id="rotateCont">Поворот
            <p>
                <label for="corner">от: </label>
                <input type="number" id="corner" value="-15" min="-360" max="360">
            </p>
            <p>
                <label for="corner_final">до: </label>
                <input type="number" id="corner_final" value="25" min="-360" max="360">
            </p>
        </div>
        <select id="selectAnimation">
            <option value="easeLinear">linear</option>
            <option value="easeSin">sin</option>
            <option value="easeBounce">bounce</option>
        </select>
        <input type="button" id="setSettingsButton" value="Нарисовать">
        <input type="button" id="animateButton" value="Анимировать">
        <input type="button" id="resetSettingsButton" value="Очистить">
    </form>

    <svg id="scene" width="960" height="540"></svg>
</body>
</html>
