<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список самых больших животных</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="./JavaScript/index.js"></script>
</head>
<body>
    <div>
        <form id="filter">
            <h3>Фильтр</h3>
            <p>
                <label for="nameAnimal">Название:</label>
                <input type="text" id="nameAnimal">
            </p>
            <p>
                <label for="typeAnimal">Тип:</label>
                <input type="text" id="typeAnimal">
            </p>
            <p>
                <label for="habitatAnimal">Среда обитания:</label>
                <input type="text" id="habitatAnimal">
            </p>
            <p>
                <label for="sizeFrom">Высота или длина:</label>
                от <input type="number" id="sizeFrom">
                до <input type="number" id="sizeTo">
            </p>
            <p>
                <label for="weightFrom">Масса тела:</label>
                от <input type="number" id="weightFrom">
                до <input type="number" id="weightTo">
            </p>
            <p>
                <label for="lifeSpanFrom">Продолжительность жизни:</label>
                от <input type="number" id="lifeSpanFrom">
                до <input type="number" id="lifeSpanTo">
            </p>
            <input type="button" id="applyFiltersButton" value="Найти">
            <input type="button" id="resetFiltersButton" value="Очистить фильтры">
        </form>
        <form id="sort">
            <p>Сортировать по</p>
            <p>
                <select id="fieldsFirst">
                </select>
                по убыванию? <input type="checkbox" id="fieldsFirstDesc">
            </p>
            <p>
                <select id="fieldsSecond">
                </select>
                по убыванию? <input type="checkbox" id="fieldsSecondDesc">
            </p>
            <p>
                <select id="fieldsThird">
                </select>
                по убыванию? <input type="checkbox" id="fieldsThirdDesc">
            </p>
            <input type="button" id="applySortButton" value="Сортировать">
            <input type="button" id="resetSortButton" value="Сбросить сортировку">
        </form>
    </div>
    <svg></svg>
    <table id="list"></table>
</body>
</html>
