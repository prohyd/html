<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таблица</title>

    <link rel="stylesheet" href="CSS/style.css">

    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/table.js"></script>
    <script src="JavaScript/filter.js"></script>
    <script src="JavaScript/sort.js"></script>
    <script src="JavaScript/main.js"></script>
</head>
<body>

<h2>Таблица</h2>

<hr>

<details>
    <summary><strong>Фильтр</strong></summary>

    <form id="filterForm">

        Название:
        <input type="text" id="name">
        <br>
    
        Тип:
        <input type="text" id="type">
        <br>
    
        Среда обитания:
        <input type="text" id="habitat">
    
        <br>
    
        Высота:
        от <input type="number" id="heightFrom">
        до <input type="number" id="heightTo">
    
        <br>
    
        Масса тела:
        от <input type="number" id="weightFrom">
        до <input type="number" id="weightTo">
    
        <br>
    
        Продолжительность жизни:
        от <input type="number" id="lifeFrom">
        до <input type="number" id="lifeTo">
    
        <br><br>
    
        <button type="button" id="find">Найти</button>
        <button type="button" id="clear">Очистить</button>
    
    </form>

</details>

<br>

<details>
    <summary><strong>Сортировка</strong></summary>

    <form id="sort">
        <p>
            Первый уровень:
            <select id="fieldsFirst"></select>
            по убыванию <input type="checkbox" id="fieldsFirstDesc">
        </p>

        <p>
            Второй уровень:
            <select id="fieldsSecond"></select>
            по убыванию <input type="checkbox" id="fieldsSecondDesc">
        </p>
        <p>
            Третий уровень:
            <select id="fieldsThird"></select>
            по убыванию <input type="checkbox" id="fieldsThirdDesc">
        </p>

        <button type="button" id="sortBtn">Сортировать</button>
        <button type="button" id="resetSort">Сброс</button>
    </form>

</details>

<br>

<table id="list" border="5" cellpadding="5" cellspacing="0"></table>

</body>
</html>
